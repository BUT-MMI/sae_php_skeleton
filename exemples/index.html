	<style>
		* {
			box-sizing: border-box;	
		}
		
		body 	{
			margin: 0px;
		}
		 
		/* Style général pour le menu. */
		ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
			overflow: hidden;
			background-color: #333;
		}

		/* Positionnement de chaque item du menu principal. */		
		li {
			display: inline-block;
		}

		/* Style pour chaque item du menu principal. */
		li a {
			display: block;
			color: white;
			text-align: center;
			padding: 15px 16px;
			text-decoration: none;
		}

		/* Positionnement pour l'item contenant le menu déroulant*/
		li.dropdown {
			display: inline-block;
		}

		/* État initial et positionnement pour le contenu du menu qui apparaisse en se plaçant sur l'item genre. */
		div.dropdown-content {
			display: none;
			position: absolute; /* Attention, positionné par rapport à la balise parente. */
			background-color: #f9f9f9;
			min-width: 160px;
			z-index: 1;
		}

		/* Style à appliquer aux liens à l'intérieur du menu déroulant. */
		.dropdown-content a {
			color: black;
			padding: 12px 16px;
			text-decoration: none;
			display: block;
			text-align: left;
		}

		/* Pseudo état de style à appliquer sur les liens du menu déroulant */
		div.dropdown-content a:hover {
			background-color: #f1f1f1;
		}

		/* Affichage du menu déroulant si la souri passe au-dessus. */
		li.dropdown:hover div.dropdown-content {
			display: block;
		}

		/* Style pour le conteneur principal des fiches des films. */
		main {
			/* Utilisation de la structuration par boîtes flexibles. */
			display: flex;
			/* Les balises contenues seront organisées par lignes.*/
			flex-direction:row;
			/* Si les balises ne tiennent pas sur une ligne. Elles passeront à la ligne suivante. */
			flex-wrap:  wrap;
			/* Permet de définir comment les balises flex sont organisées à l'intérieur du conteneur principal. */
			align-items: stretch;
		}

		/* Style pour le film principal. */
		div.Principal { 
			text-align: center;
			/* La taille de base de chaque fiche de film. */
			flex-basis: 100%;
			/* Défini comment la balise sera rétrécie par rapport à son conteneur. */ 
			flex-shrink: 1;
			/* Défini le facteur potentiel de croissance d'une balise par rapport aux autres éléments dans le conteneur parent. */ 
			flex-grow: 1;
			border: 1px solid black;
			justify-content: center;
		}

		/* Style pour chaque fiche de film. */
		div.film { 
			text-align: center;    	
			/* La taille de base de chaque fiche de film. */
			flex-basis: 300px;
			/* Défini comment la balise sera rétrécie par rapport à son conteneur. */ 
			flex-shrink: 1;
			
			/* Défini le facteur potentiel de croissance d'une balise par rapport aux autres éléments dans le conteneur parent. */ 
			flex-grow: 1;
			border: 1px solid black;
		}
		
		/* Style à appliquer aux images à l'intérieur des fiches de film et du film principal. */
		div.Principal > img, div.film > img {
			width:80%;
			/* Cette valeur de marge vous permet de centrer automatiquement du contenu. */
			margin:auto;
		}
